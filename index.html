<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eid Moon Catcher — Uniqode</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #140818;
    font-family: 'Inter', sans-serif;
  }

  /* Canvas fills the full viewport */
  #c {
    display: block;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    touch-action: none;
    cursor: none;
  }

  /* HUD overlay — sits above canvas */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    pointer-events: none;
    z-index: 10;
  }

  /* Logo */
  #hud-logo svg {
    height: 20px;
    width: auto;
    display: block;
  }

  /* Score + level */
  .hud-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .hud-lbl {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    line-height: 1;
  }
  .hud-num {
    font-size: 28px;
    font-weight: 700;
    color: #1A35FF;
    line-height: 1.1;
  }

  /* Control buttons row — bottom of screen */
  #controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 14px 20px;
    background: linear-gradient(to top, rgba(20,8,24,0.95) 0%, rgba(20,8,24,0) 100%);
    z-index: 10;
    pointer-events: all;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 24px;
    border-radius: 100px;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.12s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.94); }
  .btn:disabled { opacity: 0.25; pointer-events: none; }

  #btn-start { background: #1A35FF; color: #fff; }
  #btn-pause { background: rgba(184,174,237,0.15); color: #B8AEED; border: 1.5px solid rgba(184,174,237,0.4); }
  #btn-stop  { background: rgba(139,28,82,0.2);   color: #FFB3B3; border: 1.5px solid rgba(139,28,82,0.45); }

  /* Level hint */
  #level-bar {
    position: fixed;
    bottom: 72px; left: 0; right: 0;
    pointer-events: none;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 0 16px;
  }
  #level-bar .what-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #FFFFFF;
  }
  #level-bar .what-text {
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #level-bar .what-text .sep {
    color: rgba(255,255,255,0.2);
    font-weight: 300;
  }
  #level-bar .good { color: #B8AEED; }
  #level-bar .bad  { color: #FFB3B3; }

  /* Mobile arrow buttons */
  #move-btns {
    display: none;
    position: fixed;
    bottom: 130px;
    left: 0; right: 0;
    justify-content: space-between;
    padding: 0 16px;
    pointer-events: none;
    z-index: 20;
  }
  .move-btn {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 2px solid rgba(26,53,255,0.5);
    background: rgba(26,53,255,0.15);
    color: #fff;
    font-size: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    pointer-events: all;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    transition: background 0.1s;
  }
  .move-btn.pressed {
    background: rgba(26,53,255,0.45);
    border-color: #1A35FF;
  }
  @media (hover: none) and (pointer: coarse) {
    #move-btns { display: flex; }
  }

  /* Responsive tweaks */
  @media (max-width: 380px) {
    .hud-num { font-size: 22px; }
    .btn { padding: 9px 18px; font-size: 13px; }
    .move-btn { width: 62px; height: 62px; font-size: 24px; }
  }
  @media (min-width: 768px) {
    .hud-num { font-size: 32px; }
    #hud { padding: 18px 32px; }
    .btn { padding: 12px 32px; font-size: 15px; }
    #level-bar { font-size: 13px; }
    .move-btn { width: 84px; height: 84px; font-size: 32px; }
    #move-btns { bottom: 150px; padding: 0 32px; }
  }
  @media (min-width: 1200px) {
    #hud-logo svg { height: 24px; }
  }
</style>
</head>

<!-- Level hint -->
<div id="level-bar">
  <span class="what-label">What to do?</span>
  <span class="what-text">
    <span class="good">🌙 Gather moon &amp; stars</span>
    <span class="sep">|</span>
    <span class="bad">🧨 Avoid firecrackers</span>
  </span>
</div>

<!-- Controls -->
<div id="controls">
  <button class="btn" id="btn-start">▶ Start</button>
  <button class="btn" id="btn-pause" disabled>⏸ Pause</button>
  <button class="btn" id="btn-stop"  disabled>■ Stop</button>
</div>

<!-- Mobile arrow buttons (touch only) -->
<div id="move-btns">
  <button class="move-btn" id="btn-left">&#8592;</button>
  <button class="move-btn" id="btn-right">&#8594;</button>
</div>

<script>
// ── Canvas & context ──────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// Logical game world — items positioned in this coordinate space
// Canvas renders at actual device pixels, we scale with ctx.scale
let W = window.innerWidth;
let H = window.innerHeight;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
  basket.y = H - 90;
  basket.w = Math.max(60, Math.min(100, W * 0.18));
  if (basket.x > W - basket.w/2) basket.x = W - basket.w/2;
  regen_bg();
  regen_floaters();
}

window.addEventListener('resize', () => { ctx.setTransform(1,0,0,1,0,0); resize(); });

// ── Palette ───────────────────────────────────────────────────────────────────
const P = {
  blue:       '#1A35FF',
  lightBlue:  '#C2E4F8',
  lavender:   '#B8AEED',
  berry:      '#8B1C52',
  salmon:     '#FFB3B3',
  darkPurple: '#140818',
  lemon:      '#EEFF00',
  ocean:      '#00E896',
  white:      '#FFFFFF',
  black:      '#000000',
};

// ── DOM refs ──────────────────────────────────────────────────────────────────
const scoreEl  = document.getElementById('score-val');
const levelEl  = document.getElementById('level-val');
const levelBar = document.getElementById('level-bar');
const btnStart = document.getElementById('btn-start');
const btnPause = document.getElementById('btn-pause');
const btnStop  = document.getElementById('btn-stop');

// ── State ─────────────────────────────────────────────────────────────────────
let state = 'idle';
let score = 0, level = 1;
const isTouchDevice = () => navigator.maxTouchPoints > 0;
// Explosion state
let explosion = { active: false, frame: 0, duration: 90, waves: [], shakeX: 0, shakeY: 0 };
// Start screen animation clock
let idleClock = 0;
// Floaters on start screen
let floaters = [];
let basket = { x: 300, y: 500, w: 80, h: 22 };
let items = [], particles = [], bgDots = [];
let frameCount = 0, spawnRate = 70;

// ── Background dots ───────────────────────────────────────────────────────────
function regen_bg() {
  bgDots = [];
  const n = Math.round((W * H) / 8000);
  for (let i = 0; i < n; i++) {
    bgDots.push({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*1.3 + 0.3,
      a: Math.random()*0.35 + 0.05,
      da: (Math.random()*0.005 + 0.002) * (Math.random()<0.5?1:-1),
    });
  }
}

function regen_floaters() {
  floaters = [];
  const types = ['moon','star','moon','star','moon'];
  for (let i = 0; i < 7; i++) {
    const t = types[i % types.length];
    floaters.push({
      type: t, x: (i+0.5) * (W/7), y: H*0.55 + (Math.sin(i*1.3)*H*0.12),
      r: itemRadius() * (0.8 + Math.random()*0.5),
      color: t==='moon' ? P.lavender : P.lightBlue,
      rot: Math.random()*Math.PI*2,
      speed: 0.4 + Math.random()*0.3,
      amp: 18 + Math.random()*22,
      phase: (i / 7) * Math.PI * 2,
    });
  }
}

// ── Spawn ─────────────────────────────────────────────────────────────────────
function itemRadius() {
  // Scale item size to screen — bigger on large screens
  const base = Math.min(W, H) * 0.035;
  return Math.max(10, Math.min(22, base));
}

function spawnItem() {
  const roll = Math.random();
  const r = itemRadius() * (0.85 + Math.random()*0.4);
  let type, points, color;
  if      (roll < 0.42) { type='moon';        points=10; color=P.lavender;  }
  else if (roll < 0.78) { type='star';        points=5;  color=P.lightBlue; }
  else                  { type='firecracker'; points=0;  color=P.salmon;    }
  const speed = (H / 340) * (1.4 + level*0.35 + Math.random()*0.9);
  items.push({
    type, points, color, r,
    bad: type==='firecracker',
    x: r + Math.random()*(W - r*2),
    y: -r - 4,
    speed,
    sway: (Math.random()*1.4 - 0.7) * (W/480),
    swayT: Math.random()*100,
    rot: Math.random()*Math.PI*2,
    sparkT: Math.random()*Math.PI*2,
  });
}

// ── Draw: Background ──────────────────────────────────────────────────────────
function drawBg() {
  ctx.fillStyle = P.darkPurple;
  ctx.fillRect(0, 0, W, H);

  bgDots.forEach(d => {
    d.a += d.da;
    if (d.a > 0.4 || d.a < 0.04) d.da *= -1;
    ctx.globalAlpha = d.a;
    ctx.fillStyle = P.lavender;
    ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  ctx.fillStyle = P.blue;
  ctx.fillRect(0, H - 5, W, 5);
}

// ── Draw: Items ───────────────────────────────────────────────────────────────
function drawMoon(x, y, r, color, rot) {
  ctx.save(); ctx.translate(x, y); ctx.rotate(rot);
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = P.darkPurple;
  ctx.beginPath(); ctx.arc(r*0.4, -r*0.1, r*0.75, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawStar(x, y, r, color, rot) {
  ctx.save(); ctx.translate(x, y); ctx.rotate(rot);
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = i*Math.PI*2/5 - Math.PI/2;
    const b = a + Math.PI/5;
    i===0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    ctx.lineTo(Math.cos(b)*r*0.4, Math.sin(b)*r*0.4);
  }
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawFirecracker(x, y, r, sparkT) {
  ctx.save(); ctx.translate(x, y);
  const bw = r*0.65, bh = r*2.0;
  ctx.fillStyle = P.salmon;
  ctx.fillRect(-bw/2, -bh/2, bw, bh);
  ctx.fillStyle = P.berry;
  ctx.fillRect(-bw/2, -bh*0.12, bw, bh*0.24);
  ctx.fillStyle = P.white;
  ctx.fillRect(-bw/2, -bh/2, bw, bh*0.16);
  ctx.fillRect(-bw/2, bh/2 - bh*0.16, bw, bh*0.16);
  ctx.strokeStyle = P.white; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0, -bh/2); ctx.lineTo(r*0.25, -bh/2 - r*0.95); ctx.stroke();
  ctx.globalAlpha = 0.6 + Math.sin(sparkT)*0.4;
  ctx.fillStyle = P.lemon;
  ctx.beginPath(); ctx.arc(r*0.25, -bh/2 - r*0.95, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawItem(it) {
  if      (it.type === 'moon')        drawMoon(it.x, it.y, it.r, it.color, it.rot);
  else if (it.type === 'star')        drawStar(it.x, it.y, it.r, it.color, it.rot);
  else                                drawFirecracker(it.x, it.y, it.r, it.sparkT);
}

// ── Draw: Basket ──────────────────────────────────────────────────────────────
function drawBasket(x, y, w, h) {
  ctx.fillStyle = P.blue;
  ctx.fillRect(x - w/2, y - h/2, w, h);
  // QR dots inside
  ctx.fillStyle = P.white;
  const s = 4, cols = Math.floor(w / 10);
  const startX = x - (cols*s + (cols-1)*4)/2;
  for (let c = 0; c < cols; c++) {
    if (c % 2 === 0) ctx.fillRect(startX + c*8, y - s/2, s, s);
  }
  // Top rim
  ctx.fillStyle = P.lightBlue;
  ctx.fillRect(x - w/2 - 2, y - h/2 - 3, w + 4, 4);
}

// ── Draw: Particles ───────────────────────────────────────────────────────────
function drawParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    if (p.square) ctx.fillRect(p.x - p.r, p.y - p.r, p.r*2, p.r*2);
    else { ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill(); }
    ctx.globalAlpha = 1;
    p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--;
  });
}

function burst(x, y, bad) {
  const cols = bad ? [P.berry, P.salmon, P.white] : [P.lavender, P.lightBlue, P.white, P.lemon];
  for (let i = 0; i < 18; i++) {
    const a = Math.random()*Math.PI*2, sp = 2 + Math.random()*4;
    particles.push({
      x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 2.5,
      r: 2 + Math.random()*4,
      color: cols[i % cols.length],
      life: 20 + Math.random()*12, maxLife: 32,
      square: Math.random() < 0.4,
    });
  }
}

// ── Big explosion trigger ────────────────────────────────────────────────────
function triggerExplosion(x, y) {
  explosion.active = true; explosion.frame = 0; explosion.waves = [];
  // 5 waves of particles from the catch point, spread outward
  const cols = [P.berry, P.salmon, P.lemon, P.white, P.lightBlue];
  for (let w = 0; w < 5; w++) {
    setTimeout(() => {
      const count = 28 + w * 8;
      for (let i = 0; i < count; i++) {
        const a = (i/count)*Math.PI*2 + w*0.3;
        const sp = (3 + w*1.5 + Math.random()*4) * (w%2===0 ? 1 : 0.7);
        particles.push({
          x: x + (Math.random()-0.5)*20,
          y: y + (Math.random()-0.5)*20,
          vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 1,
          r: 3 + Math.random()*5,
          color: cols[(i+w) % cols.length],
          life: 35 + Math.random()*25, maxLife: 60,
          square: Math.random() < 0.45,
        });
      }
    }, w * 120);
  }
  // Screen shake
  let shakeFrames = 18;
  const shakeInterval = setInterval(() => {
    explosion.shakeX = (Math.random()-0.5) * 14 * (shakeFrames/18);
    explosion.shakeY = (Math.random()-0.5) * 8  * (shakeFrames/18);
    shakeFrames--;
    if (shakeFrames <= 0) { clearInterval(shakeInterval); explosion.shakeX=0; explosion.shakeY=0; }
  }, 16);
}

// ── Start screen ─────────────────────────────────────────────────────────────
function drawStartScreen() {
  idleClock++;
  ctx.fillStyle = 'rgba(20,8,24,0.88)';
  ctx.fillRect(0, 0, W, H);

  // Blue accent bars
  ctx.fillStyle = P.blue;
  ctx.fillRect(0, 0, W, 5);
  ctx.fillRect(0, H-5, W, 5);

  // Animated floaters drifting across
  floaters.forEach((f, i) => {
    f.y = H*0.68 + Math.sin(idleClock * 0.02 + f.phase) * f.amp;
    f.rot += 0.018;
    ctx.save();
    ctx.globalAlpha = 0.18 + Math.sin(idleClock*0.025 + f.phase)*0.08;
    if (f.type==='moon') drawMoon(f.x, f.y, f.r, f.color, f.rot);
    else drawStar(f.x, f.y, f.r, f.color, f.rot);
    ctx.restore();
  });

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  // ── Title block ──
  const titleY  = H * 0.18;
  const titleSz = Math.max(26, Math.min(54, W * 0.09));
  // Pulsing blue pill behind title
  const pillW = Math.min(W*0.7, 380), pillH = titleSz*1.55;
  ctx.save();
  ctx.globalAlpha = 0.18 + Math.sin(idleClock*0.04)*0.06;
  ctx.fillStyle = P.blue;
  ctx.beginPath(); ctx.roundRect(W/2-pillW/2, titleY-pillH/2, pillW, pillH, pillH/2); ctx.fill();
  ctx.restore();
  ctx.font = `700 ${titleSz}px Inter, sans-serif`;
  ctx.fillStyle = P.white;
  ctx.fillText('Eid Mubarak!', W/2, titleY);

  // Subtitle
  const subSz = Math.max(13, Math.min(20, W * 0.038));
  ctx.font = `500 ${subSz}px Inter, sans-serif`;
  ctx.fillStyle = P.lavender;
  ctx.fillText('Gather the Moon & Stars', W/2, titleY + titleSz*0.95);

  // ── Instruction cards ──
  const cardY   = H * 0.42;
  const ir      = itemRadius() * 1.1;
  const cardGap = Math.min(W * 0.28, 150);
  const cardW   = Math.min(W * 0.25, 120);
  const cardH   = ir * 4.2;
  const lf      = Math.max(10, Math.min(14, W * 0.026));

  const cards = [
    { draw: (x,y) => drawMoon(x, y, ir, P.lavender, 0.3),
      label: 'Moon', pts: '+10 pts', col: P.lavender },
    { draw: (x,y) => drawStar(x, y, ir*0.88, P.lightBlue, idleClock*0.015),
      label: 'Star',  pts: '+5 pts',  col: P.lightBlue },
    { draw: (x,y) => drawFirecracker(x, y, ir*0.85, idleClock*0.18),
      label: 'Avoid!', pts: 'Game Over', col: P.salmon },
  ];

  cards.forEach((card, i) => {
    const cx = W/2 + (i-1)*cardGap;
    const cy = cardY;
    // Card background
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = card.col;
    ctx.beginPath(); ctx.roundRect(cx - cardW/2, cy - cardH/2, cardW, cardH, 10); ctx.fill();
    ctx.restore();
    // Outline
    ctx.save();
    ctx.strokeStyle = card.col;
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = 0.4;
    ctx.beginPath(); ctx.roundRect(cx - cardW/2, cy - cardH/2, cardW, cardH, 10); ctx.stroke();
    ctx.restore();
    // Icon
    card.draw(cx, cy - ir*0.5);
    // Label
    ctx.font = `700 ${lf}px Inter, sans-serif`;
    ctx.fillStyle = card.col;
    ctx.fillText(card.label, cx, cy + ir*0.8);
    // Points
    ctx.font = `400 ${lf*0.88}px Inter, sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.fillText(card.pts, cx, cy + ir*1.6);
  });

  // ── Controls hint — two blocks matching WHAT TO DO style ──
  const ctrlY   = H * 0.75;
  const isTouch = isTouchDevice();
  const lblSz   = Math.max(8, Math.min(10, W * 0.018));
  const valSz   = Math.max(13, Math.min(16, W * 0.032));
  const pad     = Math.min(W * 0.06, 36); // space between divider and text

  // Shared label centered
  ctx.font = `700 ${lblSz}px Inter, sans-serif`;
  ctx.fillStyle = P.white;
  const heading = 'HOW TO MOVE THE BASKET?';
  ctx.textAlign = 'center';
  ctx.fillText(heading, W/2, ctrlY);

  const rowY = ctrlY + valSz * 1.6;

  // Block 1 — right-aligned, flush to divider
  ctx.font = `500 ${valSz}px Inter, sans-serif`;
  ctx.fillStyle = P.lavender;
  ctx.textAlign = 'right';
  ctx.fillText(isTouch ? '← Tap & hold →' : '🖱 Move mouse', W/2 - pad, rowY);

  // Divider
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(W/2 - 1, ctrlY + valSz * 0.6, 2, valSz * 1.8);

  // Block 2 — left-aligned, flush to divider
  ctx.font = `500 ${valSz}px Inter, sans-serif`;
  ctx.fillStyle = P.lightBlue;
  ctx.textAlign = 'left';
  ctx.fillText(isTouch ? '← → Swipe' : '← → Arrow keys', W/2 + pad, rowY);

  ctx.textAlign = 'left';
}

// ── Game Over screen ──────────────────────────────────────────────────────────
function drawGameOver() {
  // Dim overlay fades in after explosion settles
  const fadein = Math.min(1, (explosion.frame - 40) / 40);
  if (fadein <= 0) return;
  ctx.fillStyle = `rgba(20,8,24,${0.88 * fadein})`;
  ctx.fillRect(0, 0, W, H);

  ctx.save(); ctx.globalAlpha = fadein;

  ctx.fillStyle = P.berry;
  ctx.fillRect(0, 0, W, 5);
  ctx.fillRect(0, H-5, W, 5);

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  const titleSz = Math.max(26, Math.min(52, W * 0.085));
  ctx.font = `700 ${titleSz}px Inter, sans-serif`;
  ctx.fillStyle = P.salmon;
  ctx.fillText('Game Over', W/2, H * 0.38);

  const subSz = Math.max(16, Math.min(28, W * 0.05));
  ctx.font = `700 ${subSz}px Inter, sans-serif`;
  ctx.fillStyle = P.white;
  ctx.fillText(`${score} pts`, W/2, H * 0.38 + titleSz*1.15);

  ctx.font = `400 ${subSz*0.7}px Inter, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.38)';
  ctx.fillText(`Level ${level} reached`, W/2, H * 0.38 + titleSz*1.15 + subSz*1.3);

  ctx.restore();
  ctx.textAlign = 'left';
}

function drawPaused() {
  ctx.fillStyle = 'rgba(20,8,24,0.72)';
  ctx.fillRect(0, 0, W, H);
  const sz = Math.max(24, Math.min(38, W * 0.065));
  ctx.font = `700 ${sz}px Inter, sans-serif`;
  ctx.fillStyle = P.white;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Paused', W/2, H/2);
  ctx.textAlign = 'left';
}

// ── Update ────────────────────────────────────────────────────────────────────
function update() {
  applyMobileMove();
  frameCount++;
  if (frameCount % spawnRate === 0) spawnItem();

  for (const it of items) {
    it.y += it.speed;
    it.swayT += 0.03;
    it.x = Math.max(it.r, Math.min(W - it.r, it.x + Math.sin(it.swayT) * it.sway));
    it.rot += 0.022;
    it.sparkT += 0.18;

    if (
      it.y + it.r > basket.y - basket.h/2 &&
      it.y - it.r < basket.y + basket.h/2 &&
      it.x > basket.x - basket.w/2 - 6 &&
      it.x < basket.x + basket.w/2 + 6
    ) {
      burst(it.x, it.y, it.bad);
      if (it.bad) { triggerExplosion(it.x, it.y); state = 'over'; setButtons('over'); }
      else { score += it.points; scoreEl.textContent = score; }
      it.y = H + 100;
    }
  }
  items = items.filter(it => it.y <= H + 40);

  const newLevel = Math.floor(score / 80) + 1;
  if (newLevel !== level) {
    level = newLevel;
    levelEl.textContent = level;
    levelBar.querySelector('.what-label').textContent = `Level ${level} — faster!`;
    spawnRate = Math.max(28, 70 - level * 6);
  }
}

// ── Main draw loop ────────────────────────────────────────────────────────────
function draw() {
  // Apply screen shake offset
  ctx.save();
  ctx.translate(explosion.shakeX, explosion.shakeY);

  drawBg();
  items.forEach(drawItem);
  drawBasket(basket.x, basket.y, basket.w, basket.h);
  drawParticles();

  ctx.restore();

  if (state === 'idle')   drawStartScreen();
  if (state === 'over')   { explosion.frame++; drawGameOver(); }
  if (state === 'paused') drawPaused();
}

function loop() {
  if (state === 'playing') update();
  draw();
  requestAnimationFrame(loop);
}

// ── Controls ──────────────────────────────────────────────────────────────────
function setButtons(s) {
  if (s === 'idle' || s === 'over') {
    btnStart.disabled = false;
    btnStart.textContent = s === 'over' ? '▶ Play Again' : '▶ Start';
    btnPause.disabled = true; btnPause.textContent = '⏸ Pause';
    btnStop.disabled  = true;
  } else if (s === 'playing') {
    btnStart.disabled = true;
    btnPause.disabled = false; btnPause.textContent = '⏸ Pause';
    btnStop.disabled  = false;
  } else if (s === 'paused') {
    btnStart.disabled = true;
    btnPause.disabled = false; btnPause.textContent = '▶ Resume';
    btnStop.disabled  = false;
  }
}

function startGame() {
  score = 0; level = 1; items = []; particles = []; frameCount = 0; spawnRate = 70;
  explosion = { active: false, frame: 0, duration: 90, waves: [], shakeX: 0, shakeY: 0 }; idleClock = 0;
  scoreEl.textContent = '0'; levelEl.textContent = '1';
  levelBar.querySelector('.what-text .good').textContent = '🌙 Gather moon & stars';
  basket.x = W / 2; state = 'playing';
  setButtons('playing');
}

btnStart.addEventListener('click', startGame);
btnPause.addEventListener('click', () => {
  if (state === 'playing') { state = 'paused'; setButtons('paused'); }
  else if (state === 'paused') { state = 'playing'; setButtons('playing'); }
});
btnStop.addEventListener('click', () => { state = 'over'; setButtons('over'); });

// ── Input ─────────────────────────────────────────────────────────────────────
// Desktop: mouse follow
canvas.addEventListener('mousemove', e => {
  if (state === 'playing') {
    basket.x = Math.max(basket.w/2, Math.min(W - basket.w/2, e.clientX));
  }
});

// Mobile: tap-and-hold left/right arrow buttons
// Uses smooth acceleration — starts slow, speeds up while held
let moveDir = 0;      // -1 left, 0 none, 1 right
let moveSpeed = 0;    // current px/frame
const MOVE_ACCEL = 0.8;
const MOVE_MAX   = 18;

function pressDir(dir) {
  moveDir = dir;
  moveSpeed = 4; // snappy start
  document.getElementById(dir < 0 ? 'btn-left' : 'btn-right').classList.add('pressed');
}
function releaseDir(dir) {
  if (moveDir === dir) { moveDir = 0; moveSpeed = 0; }
  document.getElementById(dir < 0 ? 'btn-left' : 'btn-right').classList.remove('pressed');
}

const btnLeft  = document.getElementById('btn-left');
const btnRight = document.getElementById('btn-right');

// Touch events on buttons (prevent triggering canvas move)
btnLeft.addEventListener('touchstart',  e => { e.preventDefault(); if (state==='playing') pressDir(-1); }, { passive: false });
btnLeft.addEventListener('touchend',    e => { e.preventDefault(); releaseDir(-1); }, { passive: false });
btnLeft.addEventListener('touchcancel', e => { releaseDir(-1); });
btnRight.addEventListener('touchstart',  e => { e.preventDefault(); if (state==='playing') pressDir(1); }, { passive: false });
btnRight.addEventListener('touchend',    e => { e.preventDefault(); releaseDir(1); }, { passive: false });
btnRight.addEventListener('touchcancel', e => { releaseDir(1); });

// Also support mouse click-and-hold on the arrow buttons (desktop fallback)
btnLeft.addEventListener('mousedown',  () => { if (state==='playing') pressDir(-1); });
btnRight.addEventListener('mousedown', () => { if (state==='playing') pressDir(1); });
window.addEventListener('mouseup', () => { releaseDir(-1); releaseDir(1); });
// Keyboard arrow keys — reuse same pressDir/releaseDir system
window.addEventListener('keydown', e => {
  if (state !== 'playing') return;
  if (e.key === 'ArrowLeft'  && moveDir !== -1) { e.preventDefault(); pressDir(-1); }
  if (e.key === 'ArrowRight' && moveDir !==  1) { e.preventDefault(); pressDir(1);  }
});
window.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft')  releaseDir(-1);
  if (e.key === 'ArrowRight') releaseDir(1);
});

// Apply movement each frame inside update()
function applyMobileMove() {
  if (moveDir === 0) return;
  moveSpeed = Math.min(MOVE_MAX, moveSpeed + MOVE_ACCEL);
  basket.x = Math.max(basket.w/2, Math.min(W - basket.w/2, basket.x + moveDir * moveSpeed));
}

// ── Init ──────────────────────────────────────────────────────────────────────
resize();
setButtons('idle');
loop();
</script>
</body>
</html>
